services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: abacus_rcr
      POSTGRES_USER: abacus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abacus -d abacus_rcr"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../QBO FOSS alternative
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://abacus:${POSTGRES_PASSWORD}@db:5432/abacus_rcr
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SONNET_MODEL: ${SONNET_MODEL:-claude-sonnet-4-20250514}
      DEBUG: "false"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../QBO FOSS alternative/frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  pgdata:
